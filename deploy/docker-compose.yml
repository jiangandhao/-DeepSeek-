version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: health-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: health_management
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../data/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - health-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: health-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - health-network

  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/docker/Dockerfile.backend
    container_name: health-backend
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/health_management?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root123
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-your-api-key-here}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - health-network

  ai-model:
    build:
      context: ../ai-model
      dockerfile: ../deploy/docker/Dockerfile.ai
    container_name: health-ai-model
    ports:
      - "5000:5000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-your-api-key-here}
    networks:
      - health-network

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/docker/Dockerfile.frontend
    container_name: health-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
      - ai-model
    networks:
      - health-network

  nginx:
    image: nginx:alpine
    container_name: health-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - health-network

volumes:
  mysql-data:
  redis-data:

networks:
  health-network:
    driver: bridge
